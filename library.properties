name=NiusCrypto
version=0.3.0
author=NiusRobotLab
maintainer=dunknowcoding
sentence=Hardware-accelerated cryptography for the ArduinoNRF board package, built on the nRF52840 CryptoCell 310 (CC310).
paragraph=One friendly API for random, hashing (SHA-256/HMAC), symmetric ciphers (AES-CBC/CTR/GCM) and public-key crypto (ECDSA / ECDH on P-256). It drives the real Arm CryptoCell 310 hardware accelerator through Nordic's CRYS runtime (libnrf_cc310.a) when vendored - SHA, AES-CBC/CTR, ECDSA/ECDH and the TRNG all run on hardware, with AES-GCM provided by nrf_oberon - and transparently falls back to the nRF52840 on-chip AES (ECB) and RNG peripherals plus a software SHA-256 when the blobs are absent. Pluggable backends mirror the ArduinoNRF-IMU bus design so the same sketch works either way. Import the CRYS binary with vendor/tools/import_cc310_sdk.py and fetch Oberon with vendor/tools/fetch_cc310.py --oberon-only; see docs/VENDORING.md and docs/BOARD_BRINGUP.md.
category=Other
url=https://github.com/dunknowcoding/ArduinoNRF-Crypto
architectures=nrf52
includes=NiusCrypto.h,ArduinoNRF_Crypto.h
depends=
# The two directives below make arduino-cli link the vendored archives from
# src/cortex-m4/ : libnrf_cc310.a (CRYS runtime, imported from a local nRF5 SDK
# by vendor/tools/import_cc310_sdk.py) and liboberon.a (AES-GCM, fetched by
# vendor/tools/fetch_cc310.py). Without the archives, remove these two lines to
# build the on-chip fallback only.
precompiled=true
ldflags=-Wl,--start-group -lnrf_cc310 -loberon -Wl,--end-group
